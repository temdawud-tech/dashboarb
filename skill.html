
<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUWC - Skills & Contribution</title>
    <style>
        /* Background & Container */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #064e3b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 20px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.85); /* Qulqullinni isaa dabaleera */
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 30px;
        }

        /* Tabs */
        .step-tabs {
            background: #065f46;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .form-title {
            text-align: center;
            font-size: 16px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 20px;
        }

        /* Inputs & Labels */
        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #334155;
            margin-bottom: 6px;
        }

        .text-area {
            width: 100%;
            height: 85px;
            padding: 12px;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            resize: none;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .text-area:focus {
            border-color: #065f46;
            background: #f0fdf4;
            box-shadow: 0 0 0 3px rgba(6, 95, 70, 0.1);
        }

        /* Button Group & Next Button Style (Magariisa) */
        .button-group {
            display: flex;
            justify-content: center;
            margin-top: 25px;
        }

        .btn-next {
            background: #065f46; /* Halluu Magariisa */
            color: white;       /* Barreeffama Adii */
            padding: 12px 60px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(6, 95, 70, 0.2);
        }

        .btn-next:hover {
            background: #047857;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(6, 95, 70, 0.3);
        }
    </style>
</head>
<body>

    <div class="form-card">
        <div class="step-tabs">
            <h2>Skills & Contribution</h2>
        </div>

        <h3 class="form-title">STUDENT REGISTRATION FORM</h3>

        <form id="skillsForm">
            <div class="input-group">
                <label>Academic Skills</label>
                <textarea class="text-area" placeholder="e.g., 'I am good at Python programming and can tutor students.'"></textarea>
            </div>

            <div class="input-group">
                <label>Spiritual Skills</label>
                <textarea class="text-area" placeholder="e.g., 'I can lead prayers (Imam) or teach Quran.'"></textarea>
            </div>

            <div class="input-group">
                <label>Contribution</label>
                <textarea class="text-area" placeholder="How do you want to help the community?"></textarea>
            </div>

            <div class="button-group">
                <button type="button" class="btn-next" onclick="window.location.href='password.html'">Next</button>
            </div>
        </form>
    </div>

</body>
</html>
