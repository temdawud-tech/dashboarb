<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUWC - Skills & Contribution</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #064e3b 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.9);
            width: 100%; max-width: 500px;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 30px;
        }

        .step-tabs {
            background: #065f46; color: white; text-align: center;
            padding: 15px; border-radius: 8px; margin-bottom: 25px;
        }

        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; color: #334155; margin-bottom: 6px; }

        .text-area {
            width: 100%; height: 85px; padding: 12px; border: 1.5px solid #cbd5e1;
            border-radius: 8px; font-size: 13px; outline: none; box-sizing: border-box; transition: 0.3s;
        }

        .text-area:focus { border-color: #065f46; background: #f0fdf4; }

        /* --- BUTTON GROUP --- */
        .button-group {
            display: flex; gap: 15px; justify-content: space-between; margin-top: 25px;
        }

        .btn {
            padding: 12px 20px; border-radius: 8px; font-weight: 700;
            font-size: 15px; cursor: pointer; border: none; transition: 0.3s; flex: 1;
        }

        .btn-back { background: #64748b; color: white; }
        .btn-next { background: #065f46; color: white; }

        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        @media (max-width: 480px) {
            body {
                align-items: flex-start;
                padding: 14px;
            }
            .form-card {
                padding: 24px 16px;
                margin-top: 18px;
            }
            .step-tabs h2 {
                font-size: 20px;
            }
            .text-area {
                font-size: 16px;
            }
            .button-group {
                flex-direction: column-reverse;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="form-card">
        <div class="step-tabs">
            <h2>Skills & Contribution</h2>
        </div>

        <form id="skillsForm">
            <div class="input-group">
                <label>Academic Skills</label>
                <textarea id="academicSkill" class="text-area" placeholder="e.g., 'I am good at Python programming...'"></textarea>
            </div>

            <div class="input-group">
                <label>Spiritual Skills</label>
                <textarea id="spiritualSkill" class="text-area" placeholder="e.g., 'I can lead prayers or teach Quran.'"></textarea>
            </div>

            <div class="input-group">
                <label>Contribution</label>
                <textarea id="contribution" class="text-area" placeholder="How do you want to help the community?"></textarea>
            </div>

            <div class="button-group">
                <button type="button" class="btn btn-back" onclick="window.location.href='fcontact.html'">Back</button>
                <button type="button" class="btn btn-next" onclick="saveSkillsAndContinue()">Next</button>
            </div>
        </form>
    </div>

    <script>
        async function saveSkillsAndContinue() {
            const data = {
                universityId: localStorage.getItem('tempStudentId'),
                academicSkill: document.getElementById('academicSkill').value.trim(),
                spiritualSkill: document.getElementById('spiritualSkill').value.trim(),
                contribution: document.getElementById('contribution').value.trim()
            };

            // Ragaa erguu
            try {
                const response = await fetch('http://localhost:5000/api/skills', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // Milkaa'us baatus, gara fuula itti aanuutti (Verification) akka darbuuf:
                window.location.href = 'verification.html'; 

            } catch (err) {
                console.error("Server error:", err);
                // Server-ni yoo jiraachuu baate illee gara fuula itti aanutti si geessa
                window.location.href = 'verification.html'; 
            }
        }
    </script>
</body>
</html>
