<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUWC - Password Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #064e3b 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            width: 100%; max-width: 400px;
            border-radius: 15px; padding: 30px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .logo-text { font-weight: 900; color: #065f46; font-size: 20px; text-transform: uppercase; margin-bottom: 10px; }
        
        .step-header { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 25px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; color: #334155; margin-bottom: 8px; }

        /* Input Container for the Eye Icon */
        .input-box { position: relative; }

        .input-box input {
            width: 100%; padding: 12px 45px 12px 15px;
            border: 1.5px solid #cbd5e1; border-radius: 8px;
            font-size: 14px; outline: none; transition: 0.3s;
        }

        .input-box input:focus { border-color: #059669; box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1); }

        /* Eye Icon Style */
        .eye-icon {
            position: absolute; right: 15px; top: 50%;
            transform: translateY(-50%); cursor: pointer;
            color: #64748b; font-size: 16px;
        }
        .eye-icon:hover { color: #059669; }

        .hint { font-size: 11px; color: #1e40af; margin-top: 5px; font-weight: 500; font-style: italic; }

        .submit-btn {
            width: 100%; background: #065f46; color: white;
            padding: 14px; border: none; border-radius: 8px;
            font-weight: 700; font-size: 15px; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; margin-top: 10px;
        }
        .submit-btn:hover { background: #047857; transform: translateY(-1px); }

        .footer-text { font-size: 11px; color: #64748b; margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="logo-text">AUWCMSJ</div>
        <h2 class="step-header">Create Password</h2>

        <form id="passwordForm">
            <div class="form-group">
                <label for="password">New Password</label>
                <div class="input-box">
                    <input id="password" type="password" placeholder="Enter your password" required>
                    <i class="fa-solid fa-eye eye-icon" id="togglePassword"></i>
                </div>
                <p class="hint">Minimum 8 chars, 1 uppercase & 1 symbol</p>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-box">
                    <input id="confirmPassword" type="password" placeholder="Re-enter password" required>
                    <i class="fa-solid fa-eye eye-icon" id="toggleConfirm"></i>
                </div>
            </div>

<button type="button" class="btn-next" onclick="goToVerification()">Next</button>            
            <p class="footer-text">Secure your account with a strong password.</p>
        </form>
    </div>

   <script>
    // 1. Password ijaan akka mul'atu gochuuf (Eye Icon Logic)
    // IDs HTML kee: togglePassword fi password
    const togglePassword = document.querySelector('#togglePassword');
    const passwordField = document.querySelector('#password');

    if (togglePassword && passwordField) {
        togglePassword.addEventListener('click', function () {
            // Gosa input (password ykn text) jijjiiruuf
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            
            // Suura ijaa jijjiiruuf (fa-eye irraa gara fa-eye-slash)
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    }

    // 2. Confirm Password ija isaas akka hojjetu gochuuf
    const toggleConfirm = document.querySelector('#toggleConfirm');
    const confirmField = document.querySelector('#confirmPassword');

    if (toggleConfirm && confirmField) {
        toggleConfirm.addEventListener('click', function () {
            const type = confirmField.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmField.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    }

    // 3. Gara Verification Page-itti darbuuf
    function goToVerification() {
        const passwordValue = document.getElementById('password').value;
        const confirmValue = document.getElementById('confirmPassword').value;

        if (passwordValue === "" || confirmValue === "") {
            alert("Maaloo, password guuti!");
            return;
        }

        if (passwordValue !== confirmValue) {
            alert("Password lamaan wal hin qixxaatu!");
            return;
        }

        if (passwordValue.length < 8) {
            alert("Password qubee 8 gadi ta'uu hin qabu!");
            return;
        }

        // Ragaa kuusuu
        localStorage.setItem('studentPassword', passwordValue);

        // GARA FUULA VERIFICATION-ITTI DARBUUF
        window.location.href = "verification.html";
    }
</script>
</body>
</html>
